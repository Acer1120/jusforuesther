<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>STARLANCE — CHOIR IV</title>
<style>
  html, body { margin:0; padding:0; overflow:hidden; background:#070A18; height:100%;
               font-family:ui-monospace, Menlo, Consolas, monospace; }
  #app { position:fixed; inset:0; touch-action:none; }
  #app canvas { display:block; cursor:none; }
  #hud { position:fixed; inset:0; pointer-events:none; z-index:2; font-weight:700; }
  #vig { position:absolute; inset:0; background:radial-gradient(ellipse at center, transparent 58%, rgba(4,6,16,.34)); }
  .overlay { position:fixed; inset:0; z-index:3; display:flex; flex-direction:column;
             align-items:center; justify-content:center; text-align:center;
             background:rgba(7,10,24,0.86); color:#E8EEF2; padding:24px; }
  .hidden { display:none !important; }
  .btn { background:#FF6B3D; color:#20130A; border:none; border-radius:0;
         padding:13px 30px; font-family:inherit; font-weight:700; font-size:14px;
         letter-spacing:3px; cursor:pointer; margin-top:26px; }
  .title { font-size:34px; letter-spacing:12px; font-weight:700; }
  .rule { width:46px; height:3px; background:#FF6B3D; margin-top:14px; }
  .blurb { font-size:13px; line-height:1.9; margin-top:18px; max-width:470px; opacity:.85; }
  .small { font-size:12px; margin-top:14px; opacity:.55; line-height:1.9; }
  #score { position:absolute; top:18px; left:50%; transform:translateX(-50%); color:#E8EEF2; font-size:26px; }
  #combo { position:absolute; top:50px; left:50%; transform:translateX(-50%); color:#E8EEF2; font-size:15px; }
  #lance { position:absolute; top:74px; left:50%; transform:translateX(-50%); height:3px; background:#FF6B3D; width:0; }
  #hearts { position:absolute; top:20px; left:20px; color:#FF6B3D; font-size:15px; letter-spacing:4px; }
  #best { position:absolute; top:20px; right:20px; color:#E8EEF2; opacity:.6; font-size:12px; }
  #hint { position:absolute; bottom:64px; left:50%; transform:translateX(-50%); color:#E8EEF2;
          opacity:.6; font-size:12px; white-space:nowrap; }
  #cross { position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); width:5px; height:5px;
           background:#E8EEF2; border-radius:50%; opacity:.75; }
  #dashPip { position:absolute; top:calc(50% + 16px); left:50%; transform:translateX(-50%);
             width:36px; height:3px; background:rgba(232,238,242,.18); }
  #dashFill { height:100%; width:100%; background:#E8EEF2; }
  #heatWrap { position:absolute; bottom:26px; left:50%; transform:translateX(-50%); width:180px; height:7px;
              background:rgba(232,238,242,.14); }
  #heatFill { height:100%; width:0; background:#FF6B3D; }
  .notch { position:absolute; top:-3px; width:1.5px; height:13px; background:rgba(232,238,242,.5); }
  #heatLbl { position:absolute; bottom:38px; left:50%; transform:translateX(-50%); color:#E8EEF2;
             opacity:.45; font-size:10px; letter-spacing:2px; }
  #bossWrap { position:absolute; top:96px; left:50%; transform:translateX(-50%); width:420px; display:none; text-align:center; }
  #bossName { color:#E8EEF2; font-size:13px; letter-spacing:5px; margin-bottom:6px; }
  #bossSub { color:#FF4438; font-size:9px; letter-spacing:3px; margin-bottom:7px; opacity:.85; }
  #bossBarBg { width:100%; height:5px; background:rgba(232,238,242,.14); }
  #bossBarFill { height:100%; width:100%; background:#FF4438; }
  #bossState { color:#E8EEF2; opacity:.5; font-size:9px; letter-spacing:2px; margin-top:6px; }
  #titleCard { position:absolute; top:34%; left:50%; transform:translateX(-50%); text-align:center; opacity:0; }
  #titleBig { color:#E8EEF2; font-size:44px; letter-spacing:16px; font-weight:700; text-shadow:0 0 24px rgba(255,68,56,.5); }
  #titleSmall { color:#FF4438; font-size:12px; letter-spacing:6px; margin-top:10px; }
  #ret { position:absolute; transform:translate(-50%,-50%); display:none; }
  #ret svg { position:absolute; inset:0; width:100%; height:100%; overflow:visible; }
  #retRing { position:absolute; inset:-14px; border-radius:50%; display:none; }
  .arrow { position:absolute; width:0; height:0; border-left:7px solid transparent;
           border-right:7px solid transparent; border-bottom:12px solid #FF4438;
           opacity:0; transform-origin:50% 70%; }
  .padBtn { position:fixed; right:22px; z-index:2; width:62px; height:62px; border-radius:50%;
            border:2px solid #FF6B3D; color:#FF6B3D; background:rgba(7,10,24,.6);
            font-family:inherit; font-weight:700; font-size:11px; letter-spacing:1px; display:none; }
  #flareBtn { bottom:34px; }
  #dashBtn { bottom:110px; border-color:#E8EEF2; color:#E8EEF2; }
  #flashRed { position:absolute; inset:0; opacity:0;
              background:radial-gradient(ellipse at center, transparent 40%, rgba(255,60,50,.5)); }
  #flashHit { position:absolute; inset:0; opacity:0; background:#fff; }
  #tintSlow { position:absolute; inset:0; opacity:0;
              background:radial-gradient(ellipse at center, transparent 55%, rgba(70,110,255,.22)); }
  .pop { position:absolute; transform:translate(-50%,-50%); pointer-events:none;
         text-shadow:0 0 8px rgba(0,0,0,.6); }
  .stat { font-size:13px; margin-top:16px; line-height:2; opacity:.8; }
  .bigNum { font-size:46px; font-weight:700; margin-top:14px; }
  .tag { font-size:15px; letter-spacing:6px; font-weight:700; color:#FF6B3D; }
</style>
</head>
<body>
<div id="app"></div>
<div id="hud">
  <div id="vig"></div>
  <div id="score"></div><div id="combo"></div><div id="lance"></div>
  <div id="hearts"></div><div id="best"></div><div id="hint"></div>
  <div id="flashRed"></div><div id="flashHit"></div><div id="tintSlow"></div>
  <div id="heatLbl">HEAT</div>
  <div id="heatWrap"><div id="heatFill"></div>
    <div class="notch" style="left:20%"></div>
    <div class="notch" style="left:30%"></div>
    <div class="notch" style="left:55%"></div>
  </div>
  <div id="bossWrap">
    <div id="bossName">TESSERON</div>
    <div id="bossSub">FOURTH OF THE CHOIR · THE FOUNDATION</div>
    <div id="bossBarBg"><div id="bossBarFill"></div></div>
    <div id="bossState"></div>
  </div>
  <div id="titleCard"><div id="titleBig">TESSERON</div><div id="titleSmall">FOURTH OF THE CHOIR · THE FOUNDATION</div></div>
  <div id="ret">
    <svg viewBox="-60 -60 120 120">
      <g id="retSpin" opacity="0.7">
        <path d="M 54 0 A 54 54 0 0 1 18.5 50.7" fill="none" stroke="#FF4438" stroke-width="1.4"/>
        <path d="M -54 0 A 54 54 0 0 1 -18.5 -50.7" fill="none" stroke="#FF4438" stroke-width="1.4"/>
      </g>
      <g transform="rotate(-90)"><circle id="retCirc" r="40" fill="none" stroke="#FF4438" stroke-width="1.6" stroke-dasharray="251.4" stroke-dashoffset="251.4"/></g>
      <g id="retBr" fill="none" stroke="#FF4438" stroke-width="2.2" opacity="0">
        <path d="M -34 -20 L -34 -34 L -20 -34"/><path d="M 20 -34 L 34 -34 L 34 -20"/>
        <path d="M 34 20 L 34 34 L 20 34"/><path d="M -20 34 L -34 34 L -34 20"/>
      </g>
      <g id="retTicks" stroke="#FF4438" stroke-width="1.5" opacity="0">
        <line x1="0" y1="-52" x2="0" y2="-45"/><line x1="0" y1="45" x2="0" y2="52"/>
        <line x1="-52" y1="0" x2="-45" y2="0"/><line x1="45" y1="0" x2="52" y2="0"/>
      </g>
      <rect id="retCore" x="-3" y="-3" width="6" height="6" fill="#FF4438" transform="rotate(45)" opacity="0"/>
    </svg>
    <div id="retRing"></div>
  </div>
  <div class="arrow" id="ar0"></div><div class="arrow" id="ar1"></div>
  <div class="arrow" id="ar2"></div><div class="arrow" id="ar3"></div>
  <div id="cross"></div>
  <div id="dashPip"><div id="dashFill"></div></div>
</div>
<button id="flareBtn" class="padBtn">FLARE<br>20</button>
<button id="dashBtn" class="padBtn">DASH</button>

<div id="menu" class="overlay">
  <div class="title">TESSERON</div>
  <div class="rule"></div>
  <div class="small" id="menuControls"></div>
  <button class="btn" id="startBtn">IGNITE</button>
</div>

<div id="resume" class="overlay hidden">
  <div class="tag">PAUSED</div>
  <div class="blurb">Mouse released.</div>
  <button class="btn" id="resumeBtn">CLICK TO RESUME</button>
</div>

<div id="over" class="overlay hidden">
  <div class="tag">SHATTERED</div>
  <div class="bigNum" id="finalScore"></div>
  <div class="small hidden" id="bestTag" style="color:#FFD98A;letter-spacing:3px;">SESSION BEST</div>
  <div class="stat" id="finalStats"></div>
  <button class="btn" id="againBtn">AGAIN</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
(function () {
"use strict";

// ================= constants =================
var EMBER = 0xff6b3d, HOT = 0xfff3e2, REDC = 0xff4438;
var CHALK = "#E8EEF2", GOLD = "#FFD98A", REDS = "#FF4438";
var H_STEP = 1 / 120, SENS = 0.0023;
var MOVE_MAX = 16, MOVE_ACCEL = 62, FR_IDLE = 4.2, FR_MOVE = 0.7;
var ARENA_R = 60, GROUND_Y = -7, CEIL_Y = GROUND_Y + 26;
var GRAV = 16, HOVER_ALT = 2.5;
var BLADE_R = 9.5, LANCE_R = 85, HIT_R = 5.2, FIN_R = 6.5;
var COST_FLARE = 20, COST_CLEAVE = 30, COST_SKEWER = 55;
var DASH_DUR = 0.13, DASH_CD = 0.75;
var isTouch = ("ontouchstart" in window);

function $(id) { return document.getElementById(id); }
function show(el) { el.classList.remove("hidden"); }
function hideEl(el) { el.classList.add("hidden"); }
function damp(k, dt) { return 1 - Math.exp(-k * dt); }
function clampN(x, a, b) { return x < a ? a : x > b ? b : x; }
function easeInOutCubic(t) { return t < 0.5 ? 4 * t * t * t : 1 - Math.pow(-2 * t + 2, 3) / 2; }
function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
function easeOutQuart(t) { return 1 - Math.pow(1 - t, 4); }
function easeHeavy(t) { var a = Math.pow(t, 2.2), b = Math.pow(1 - t, 1.6); return a / (a + b); }
function easeOutBack(t) { var c = 1.70158; var u = t - 1; return 1 + (c + 1) * u * u * u + c * u * u; }
function wrapAngle(a) { while (a > Math.PI) a -= 6.28318; while (a < -Math.PI) a += 6.28318; return a; }
function randDir() {
  var u = Math.random() * 2 - 1, t = Math.random() * Math.PI * 2, s = Math.sqrt(1 - u * u);
  return new THREE.Vector3(s * Math.cos(t), u, s * Math.sin(t));
}

// ================= audio =================
var AC = null, master, windGain, windFilt;
function audioEnsure() {
  if (AC) { if (AC.state === "suspended") AC.resume(); return; }
  try {
    AC = new (window.AudioContext || window.webkitAudioContext)();
    master = AC.createGain(); master.gain.value = 0.5; master.connect(AC.destination);
    var len = AC.sampleRate * 1.5;
    var buf = AC.createBuffer(1, len, AC.sampleRate);
    var d = buf.getChannelData(0);
    for (var i = 0; i < len; i++) d[i] = Math.random() * 2 - 1;
    var src = AC.createBufferSource(); src.buffer = buf; src.loop = true;
    windFilt = AC.createBiquadFilter(); windFilt.type = "bandpass"; windFilt.Q.value = 0.7;
    windGain = AC.createGain(); windGain.gain.value = 0;
    src.connect(windFilt); windFilt.connect(windGain); windGain.connect(master);
    src.start();
  } catch (e) { AC = null; }
}
function blip(f0, f1, dur, type, vol, delay) {
  if (!AC) return;
  try {
    var t = AC.currentTime + (delay || 0);
    var o = AC.createOscillator(), g = AC.createGain();
    o.type = type; o.frequency.setValueAtTime(f0, t);
    o.frequency.exponentialRampToValueAtTime(Math.max(20, f1), t + dur);
    g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.001, t + dur);
    o.connect(g); g.connect(master); o.start(t); o.stop(t + dur + 0.02);
  } catch (e) {}
}
function burstNoise(dur, vol, f, delay) {
  if (!AC) return;
  try {
    var t = AC.currentTime + (delay || 0), n = Math.floor(AC.sampleRate * dur);
    var b = AC.createBuffer(1, n, AC.sampleRate), d = b.getChannelData(0);
    for (var i = 0; i < n; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / n);
    var s = AC.createBufferSource(); s.buffer = b;
    var fl = AC.createBiquadFilter(); fl.type = "lowpass"; fl.frequency.value = f;
    var g = AC.createGain(); g.gain.value = vol;
    s.connect(fl); fl.connect(g); g.connect(master); s.start(t);
  } catch (e) {}
}
var PENT = [0, 3, 5, 7, 10, 12, 15, 17, 19];
var sfx = {
  wind: function (x) {
    if (!AC) return;
    var t = AC.currentTime;
    windGain.gain.setTargetAtTime(Math.min(0.13, x * 0.13), t, 0.08);
    windFilt.frequency.setTargetAtTime(200 + x * 1900, t, 0.08);
  },
  lance: function () { blip(180, 900, 0.12, "sine", 0.1); burstNoise(0.09, 0.1, 2400); },
  cleaveS: function () { blip(160, 760, 0.11, "sine", 0.1); blip(200, 980, 0.12, "sine", 0.09, 0.09); burstNoise(0.14, 0.12, 2000); },
  chargeS: function () { blip(240, 720, 0.4, "sine", 0.06); },
  skewerS: function () { blip(120, 1400, 0.2, "sawtooth", 0.14); burstNoise(0.22, 0.2, 3800); blip(60, 34, 0.3, "sine", 0.2); },
  flareS: function () { blip(70, 36, 0.5, "sine", 0.3); burstNoise(0.3, 0.2, 900); },
  denied: function () { blip(110, 82, 0.1, "square", 0.12); },
  kill: function (c) {
    var f = 392 * Math.pow(2, PENT[Math.min(8, c - 1)] / 12);
    blip(f, f, 0.14, "sine", 0.16); blip(f * 2, f * 2, 0.08, "sine", 0.06);
    burstNoise(0.08, 0.14, 3200); blip(52, 30, 0.14, "sine", 0.2);
  },
  hurtS: function () { blip(160, 26, 0.5, "sawtooth", 0.3); burstNoise(0.25, 0.26, 500); },
  lockS: function () { blip(1200, 1500, 0.03, "sine", 0.03); },
  over: function () { blip(220, 40, 1.2, "sine", 0.22); burstNoise(0.5, 0.2, 700); },
  begin: function () { blip(220, 440, 0.16, "sine", 0.1); blip(330, 660, 0.22, "sine", 0.06); },
  dashS: function () { burstNoise(0.12, 0.16, 2800); blip(300, 720, 0.08, "sine", 0.06); },
  clank: function () { blip(340, 170, 0.07, "square", 0.16); blip(760, 700, 0.04, "triangle", 0.1); burstNoise(0.05, 0.12, 4200); },
  whoosh: function (st) {
    burstNoise(0.18 + st * 0.03, 0.1, 1500 - st * 120);
    blip(220 - st * 18, 75, 0.2 + st * 0.04, "sawtooth", 0.07);
  },
  chink: function (st) {
    blip(1150 + st * 200, 880, 0.05, "triangle", 0.12);
    blip(92 - st * 7, 40, 0.15 + st * 0.03, "sine", 0.2);
    burstNoise(0.05, 0.12, 5600);
  },
  launchS: function () { blip(180, 620, 0.16, "sine", 0.14); burstNoise(0.1, 0.14, 3000); },
  boomS: function () { blip(58, 28, 0.4, "sine", 0.3); burstNoise(0.28, 0.26, 600); },
  boltFire: function () { blip(520, 260, 0.1, "sine", 0.05); },
  boltPop: function () { blip(900, 1400, 0.05, "sine", 0.07); burstNoise(0.04, 0.08, 5000); },
  perfectS: function () { blip(880, 1760, 0.14, "sine", 0.12); blip(1320, 2200, 0.1, "sine", 0.07, 0.05); },
};

// ================= renderer / scene =================
var renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: "high-performance" });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
$("app").appendChild(renderer.domElement);
var canvas = renderer.domElement;

var scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x101830, 0.011);
var camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 900);
camera.rotation.order = "YXZ";

var dome = new THREE.Mesh(
  new THREE.SphereGeometry(600, 24, 16),
  new THREE.ShaderMaterial({
    side: THREE.BackSide, depthWrite: false, fog: false,
    vertexShader: "varying vec3 vDir; void main(){ vDir=normalize(position); gl_Position=projectionMatrix*modelViewMatrix*vec4(position,1.0); }",
    fragmentShader:
      "varying vec3 vDir; void main(){ float h=vDir.y;" +
      " vec3 top=vec3(0.05,0.075,0.175); vec3 hor=vec3(0.66,0.29,0.22); vec3 low=vec3(0.04,0.055,0.12);" +
      " float band=exp(-abs(h)*9.0);" +
      " vec3 c=mix(h>0.0?top:low,hor,band*0.7);" +
      " gl_FragColor=vec4(c,1.0); }",
  })
);
scene.add(dome);

(function () {
  var n = 900, pos = new Float32Array(n * 3);
  for (var i = 0; i < n; i++) {
    var v = randDir().multiplyScalar(420 + Math.random() * 120);
    pos[i * 3] = v.x;
    pos[i * 3 + 1] = Math.abs(v.y) * (Math.random() < 0.85 ? 1 : -0.3);
    pos[i * 3 + 2] = v.z;
  }
  var g = new THREE.BufferGeometry();
  g.setAttribute("position", new THREE.BufferAttribute(pos, 3));
  scene.add(new THREE.Points(g, new THREE.PointsMaterial({ color: 0xbcc8e8, size: 1.4, sizeAttenuation: false, transparent: true, opacity: 0.7, fog: false })));
})();

var shell = new THREE.Mesh(
  new THREE.IcosahedronGeometry(ARENA_R + 2, 2),
  new THREE.MeshBasicMaterial({ color: 0x8fa3d9, wireframe: true, transparent: true, opacity: 0.06 })
);
scene.add(shell);

// ground with grid + arena edge glow
var groundMat = new THREE.ShaderMaterial({
  fog: false,
  uniforms: { uSky: { value: new THREE.Color(0x0d1428) } },
  vertexShader:
    "varying vec3 vW;\n" +
    "void main(){ vec4 w = modelMatrix * vec4(position,1.0); vW = w.xyz;\n" +
    "  gl_Position = projectionMatrix * viewMatrix * w; }",
  fragmentShader:
    "uniform vec3 uSky; varying vec3 vW;\n" +
    "void main(){\n" +
    "  vec2 c = vW.xz / 6.0;\n" +
    "  vec2 g = abs(fract(c - 0.5) - 0.5) / fwidth(c);\n" +
    "  float line = 1.0 - min(min(g.x, g.y), 1.0);\n" +
    "  float dCam = distance(vW, cameraPosition);\n" +
    "  vec3 col = mix(vec3(0.028, 0.04, 0.082), uSky, smoothstep(30.0, 120.0, dCam));\n" +
    "  col += vec3(0.12, 0.19, 0.34) * line * (1.0 - smoothstep(12.0, 65.0, dCam));\n" +
    "  float er = abs(length(vW.xz) - 59.5);\n" +
    "  col += vec3(1.0, 0.42, 0.24) * (1.0 - smoothstep(0.0, 1.4, er)) * 0.3;\n" +
    "  gl_FragColor = vec4(col, 1.0);\n" +
    "}",
});
groundMat.extensions = { derivatives: true };
var ground = new THREE.Mesh(new THREE.CircleGeometry(170, 48), groundMat);
ground.rotation.x = -Math.PI / 2;
ground.position.y = GROUND_Y;
scene.add(ground);

// solid hex-crystal monoliths: visuals AND collision AND line of sight
var pillars = [];
var pillarMesh = new THREE.InstancedMesh(new THREE.CylinderGeometry(1, 1, 1, 6), new THREE.MeshBasicMaterial({ color: 0x0a0e1c }), 12);
(function () {
  var tmpO = new THREE.Object3D();
  for (var i = 0; i < 12; i++) {
    var ang = (i / 12) * 6.283 + Math.random() * 0.5;
    var rad = 40 + Math.random() * 16;
    var r = 1.1 + Math.random() * 1.4;
    var hgt = 8 + Math.random() * 14;
    var px = Math.cos(ang) * rad, pz = Math.sin(ang) * rad;
    pillars.push({ x: px, z: pz, r: r, top: GROUND_Y + hgt });
    tmpO.position.set(px, GROUND_Y + hgt / 2, pz);
    tmpO.scale.set(r, hgt, r);
    tmpO.rotation.set(0, Math.random() * 3.14, 0);
    tmpO.updateMatrix();
    pillarMesh.setMatrixAt(i, tmpO.matrix);
  }
  pillarMesh.instanceMatrix.needsUpdate = true;
})();
scene.add(pillarMesh);

function makeShadowMat(op) {
  return new THREE.ShaderMaterial({
    transparent: true, depthWrite: false, fog: false,
    uniforms: { uOp: { value: op }, uHot: { value: 0 } },
    vertexShader:
      "varying vec2 vUv;\n" +
      "void main(){ vUv = uv; vec4 mv = vec4(position,1.0);\n" +
      "  #ifdef USE_INSTANCING\n    mv = instanceMatrix * mv;\n  #endif\n" +
      "  gl_Position = projectionMatrix * modelViewMatrix * mv; }",
    fragmentShader:
      "uniform float uOp; uniform float uHot; varying vec2 vUv;\n" +
      "void main(){ float r = length(vUv - 0.5) * 2.0;\n" +
      "  float a = (1.0 - smoothstep(0.2, 1.0, r)) * uOp;\n" +
      "  vec3 c = mix(vec3(0.0, 0.0, 0.02), vec3(1.0, 0.45, 0.25), uHot);\n" +
      "  gl_FragColor = vec4(c, a); }",
  });
}
var playerShadow = new THREE.Mesh(new THREE.CircleGeometry(1.5, 24), makeShadowMat(0.5));
playerShadow.rotation.x = -Math.PI / 2;
scene.add(playerShadow);

// ember impact beams (kills) — beamAt supports color
var beams = [];
(function () {

    if (S.keys["d"] || S.keys["arrowright"]) WISH.add(RIGHT);
    var upIn = !!S.keys[" "], dnIn = !!(S.keys["c"] || S.keys["control"]);
    var moving = WISH.lengthSq() > 0.001;

    if (S.exhaleT > 0) {
      S.exhaleT -= h;
      if (moving) { S.vel.multiplyScalar(0.25); S.exhaleT = 0; }
      else S.vel.multiplyScalar(Math.exp(-8 * h));
    }
    var fr = moving ? FR_MOVE : FR_IDLE;
    S.vel.x *= Math.exp(-fr * h);
    S.vel.z *= Math.exp(-fr * h);
    if (moving) {
      WISH.normalize();
      var cur = S.vel.x * WISH.x + S.vel.z * WISH.z;
      var add = MOVE_MAX - cur;
      if (add > 0) {
        S.vel.x += WISH.x * Math.min(MOVE_ACCEL * h, add);
        S.vel.z += WISH.z * Math.min(MOVE_ACCEL * h, add);
      }
    }
    // vertical: anchored to the surface. SPACE flies, C dives under the floor,
    // and the surface always reclaims you.
    var SURF = GROUND_Y + HOVER_ALT;
    var below = S.p.y < GROUND_Y + 0.3;
    if (below) S.diveT += h; else S.diveT = Math.max(0, S.diveT - h * 2);
    var diving = dnIn && !upIn && S.diveT < 1.6;
    S.vel.y -= GRAV * h;
    if (upIn) {
      if (S.vel.y < 16) S.vel.y += 74 * h;
    } else if (diving) {
      S.vel.y += GRAV * h; // neutral while diving
      if (S.vel.y > -10) S.vel.y -= 40 * h;
    } else {
      var errS = clampN((SURF - S.p.y) * (S.p.y < SURF ? 30 : 14), -60, 90);
      S.vel.y += (GRAV + errS) * h;
      S.vel.y *= Math.exp((S.p.y < SURF ? -6 : -7.5) * h);
    }
    if (!moving && S.exhaleT <= 0 && S.vel.lengthSq() < 0.25 && Math.abs(S.p.y - SURF) < 0.6) {
      S.vel.set(0, 0, 0);
    }
    // melee magnetism: glide onto the lock mid-swing, settle softly between cuts
    if (S.melee && S.melee.target && !S.melee.target.dead) {
      V3.subVectors(S.melee.target.p, S.p);
      var dm = V3.length();
      if (S.melee.phase === "swing") {
        if (S.melee.thrust) {

        } else if (dm < 14.5 && dm > 2.2) {
          var gspd = clampN(dm * 6, 8, 30);
          V3.multiplyScalar(gspd / dm);
          S.vel.lerp(V3, 1 - Math.exp(-14 * h));
        } else if (dm <= 2.2) {
          S.vel.multiplyScalar(Math.exp(-10 * h));
        }
      } else if (dm < 3.5) {
        S.vel.multiplyScalar(Math.exp(-5 * h));
      }
    }
    if (S.vel.length() > 42) S.vel.setLength(42);
    S.p.addScaledVector(S.vel, h);
  }

  // world limits (always)
  var rrH = Math.hypot(S.p.x, S.p.z);
  if (rrH > ARENA_R - 2) {
    var nx = S.p.x / rrH, nz = S.p.z / rrH;
    if (rrH > ARENA_R) { S.p.x = nx * ARENA_R; S.p.z = nz * ARENA_R; }
    var vr = S.vel.x * nx + S.vel.z * nz;
    if (vr > 0) { S.vel.x -= nx * vr * 1.25; S.vel.z -= nz * vr * 1.25; }
  }
  if (S.p.y < GROUND_Y - 3.5) { S.p.y = GROUND_Y - 3.5; if (S.vel.y < 0) S.vel.y = 0; }
  var isBelow = S.p.y < GROUND_Y + 0.15;
  if (isBelow !== S.wasBelow) {
    S.wasBelow = isBelow;
    V3e.set(S.p.x, GROUND_Y + 0.12, S.p.z);
    ringAt(V3e, 0.4, 0xa9dbe4, 6, true);
    burstShards(V3e, 8, 9, 0.15, null, 0.7);
    blip(isBelow ? 400 : 260, isBelow ? 180 : 520, 0.12, "sine", 0.09);
  }
  if (S.p.y > CEIL_Y) { S.p.y = CEIL_Y; if (S.vel.y > 0) S.vel.y *= -0.3; }
  var push = pillarPushXZ(S.p, 0.9);
  if (push) {
    var vp = S.vel.x * push.nx + S.vel.z * push.nz;
    if (vp < 0) { S.vel.x -= push.nx * vp; S.vel.z -= push.nz * vp; }
  }

  // ---- melee: windup glide, analytic sweep, follow-through settle ----
  S.stringCd = Math.max(0, S.stringCd - h);
  if (S.melee) {
    var m = S.melee;
    m.t += h;
    if (m.phase === "windup") {
      m.push = -0.45 * easeInOutCubic(Math.min(1, m.t / m.wDur)) * m.pw;
      if (m.t >= m.wDur) {
        m.phase = "swing"; m.t = 0; m.lastTh = m.th0;
        sfx.whoosh(m.step);
        if (m.thrust) { S.vel.addScaledVector(m.f, 22); fovKick(5); } // the lunge
      }
    } else if (m.phase === "swing") {
      if (m.drag > 0) { m.t -= h * m.drag; m.drag *= Math.exp(-9 * h); if (m.drag < 0.02) m.drag = 0; }
      var kk2 = Math.min(1, m.t / m.dur);
      var thNow = m.th0 + (m.th1 - m.th0) * easeOutQuart(kk2);
      m.push = (-0.45 * Math.max(0, 1 - 2 * kk2) + 0.9 * Math.sin(3.1416 * kk2)) * m.pw;
      if (m.thrust) {
        m.push = 3.2 * easeOutCubic(Math.min(1, kk2 * 1.35));
        var vfw = Math.max(S.vel.dot(m.f), 14);
        S.vel.copy(m.f).multiplyScalar(vfw); // laser-straight lunge
      }
      if (kk2 > 0.02 && kk2 < 0.99) meleeSweep(m, m.lastTh, thNow);
      if (m.rib) {
        bladeDir(m, thNow, V3e);
        pushRibbonSample(m.rib, ribRoot(m, V3f), V3e, m.thrust ? 9.5 : m.step === 3 ? BLADE_LEN_FIN : BLADE_LEN);
      }
      m.lastTh = thNow;
      if (m.t >= m.dur) {
        if (m.step === 3) S.stringCd = 0.3;
        if (m.queued && m.step !== 3) {

          if (m.rib) { m.rib.state = 2; m.rib.fadeT = 0; m.rib = null; }
          m.phase = "win"; m.t = 0; m.queued = false;
          meleeSwing(m.target && !m.target.dead ? m.target : S.lockedE);
        } else {
          if (m.thrust) S.vel.multiplyScalar(0.35); // the lunge lands
          m.phase = "settle"; m.t = 0;
        }
      }
    } else if (m.phase === "settle") {
      var ks = Math.min(1, m.t / m.setDur);
      var thS = m.th1 + (m.th1 > m.th0 ? 1 : -1) * 0.5 * easeOutCubic(ks);
      m.push = Math.max(0, 0.3 * m.pw * (1 - ks));
      if (m.thrust) m.push = 3.2 * (1 - easeInOutCubic(ks));
      if (m.rib) {
        bladeDir(m, thS, V3e);
        pushRibbonSample(m.rib, ribRoot(m, V3f), V3e, m.thrust ? 9.5 : m.step === 3 ? BLADE_LEN_FIN : BLADE_LEN);
      }
      if (m.t >= m.setDur) {
        if (m.rib) { m.rib.state = 2; m.rib.fadeT = 0; m.rib = null; }
        m.phase = "win"; m.t = 0;
        if (m.queued) { m.queued = false; meleeSwing(m.target && !m.target.dead ? m.target : S.lockedE); }
      }
    } else if (m.t > m.win) S.melee = null;
  }

  // ---- windows / timers ----
  if (S.lanceT > 0) {
    S.lanceT -= h / Math.max(0.32, S.ts);
    if (S.lanceT <= 0 && S.combo > 0) S.combo = 0;
  }
  // ambient spawning disabled: the only thing in this field is the Angel
  if (BOSS) bossStep(h);

  // ---- enemies ----
  var espd = Math.min(11, 3.6 + S.t / 22);
  for (var j = 0; j < S.enemies.length; j++) {
    var e = S.enemies[j];
    e.ph += h * (e.stun > 0 ? 0.5 : 2);
    e.flash = Math.max(0, e.flash - h * 4);
    e.sqT = Math.max(0, e.sqT - h);
    if (e.stun > 0) {
      e.stun -= h;
      e.v.multiplyScalar(Math.exp(-3.5 * h));
    } else if (e.stag > 0) {
      e.stag -= h;
      e.v.multiplyScalar(Math.exp(-6 * h));
    } else if (e.launched) {
      e.v.y -= 18 * h;

    } else {
      // --- per-type AI ---
      if (e.type === "drone") {
        V3.subVectors(S.p, e.p).normalize();
        V3b.set(Math.sin(e.ph), Math.cos(e.ph * 0.7), Math.sin(e.ph * 1.3)).multiplyScalar(0.35);
        V3.add(V3b).normalize();
        e.v.lerp(V3.multiplyScalar(espd), 1 - Math.exp(-1.8 * h));
      } else if (e.type === "dart") {
        var dd2 = e.p.distanceTo(S.p);
        if (e.state === "app") {
          var want = dd2 < 16 ? -1 : dd2 > 24 ? 1 : 0;
          V3.subVectors(S.p, e.p).normalize().multiplyScalar(8 * want);
          e.v.lerp(V3, 1 - Math.exp(-2 * h));
          e.cd -= h;
          if (e.cd <= 0 && dd2 < 34 && los(e.p, S.p)) { e.state = "tel"; e.st = 0; }
        } else if (e.state === "tel") {
          e.st += h;
          e.tel = e.st / 0.55;
          e.v.multiplyScalar(Math.exp(-6 * h));
          e.aim.copy(S.p).addScaledVector(S.vel, 0.35).sub(e.p).normalize();
          if (e.st >= 0.55) { e.state = "lunge"; e.st = 0; e.tel = 0; e.pd = false; e.v.copy(e.aim).multiplyScalar(46); }
        } else if (e.state === "lunge") {
          e.st += h;
          var dl = e.p.distanceTo(S.p);
          if (dl < 2.2) {
            if (S.inv <= 0) {
              if (S.dashI > 0 || S.strike || S.graceT > 0) { if (!e.pd) { e.pd = true; perfectDodge(); } }
              else { hurt(); e.state = "tired"; e.st = 0; }
            }
          }
          if (e.st > 0.5) { e.state = "tired"; e.st = 0; }
        } else {
          e.st += h;
          e.v.multiplyScalar(Math.exp(-3 * h));
          if (e.st > 0.9) { e.state = "app"; e.cd = 2 + Math.random() * 1.5; }
        }
      } else if (e.type === "weaver") {
        var dw = e.p.distanceTo(S.p);
        var want2 = dw < 20 ? -1 : dw > 28 ? 1 : 0;
        V3.subVectors(S.p, e.p).normalize();
        V3b.set(-V3.z, 0, V3.x).multiplyScalar(3);
        V3.multiplyScalar(6 * want2).add(V3b);
        e.v.lerp(V3, 1 - Math.exp(-1.6 * h));
        e.cd -= h;
        if (e.cd <= 0) {
          e.cd = 2.6 + Math.random();
          if (los(e.p, S.p)) spawnBolt(e);
        }
      } else if (e.type === "sentinel") {
        var tf = Math.atan2(S.p.z - e.p.z, S.p.x - e.p.x);
        var df = wrapAngle(tf - e.facing);
        e.facing += clampN(df, -0.8 * h, 0.8 * h);
        var ds = e.p.distanceTo(S.p);
        if (e.state === "tel") {
          e.st += h;
          e.tel = e.st / 0.7;
          e.v.set(0, 1.2, 0);
          if (e.st >= 0.7) {
            e.state = "cool"; e.st = 0; e.tel = 0; e.cd = 5;
            S.slams.push({ x: e.p.x, z: e.p.z, t: 0, pd: false });
            sfx.boomS();
            S.shake = Math.max(S.shake, 0.2);
            V3e.set(e.p.x, GROUND_Y + 0.15, e.p.z);
            ringAt(V3e, 0.3, REDC, 4, true);
          }
        } else {
          e.cd -= h;
          if (e.state === "cool") { e.st += h; if (e.st > 1) e.state = "app"; }
          if (ds > 4) {
            V3.set(Math.cos(e.facing), 0, Math.sin(e.facing)).multiplyScalar(2.2);
            e.v.lerp(V3, 1 - Math.exp(-1.5 * h));
          } else e.v.multiplyScalar(Math.exp(-2 * h));
          var altP = S.p.y - GROUND_Y;
          if (e.state === "app" && e.cd <= 0 && ds < 14 && altP < 7) { e.state = "tel"; e.st = 0; }
        }
      } else if (e.type === "tesseron") {
        e.v.set(0, 0, 0); e.stag = 0; e.stun = 0; e.launched = false;
      } else if (e.type === "zenith") {
        var ty = GROUND_Y + 18 + Math.sin(e.ph * 0.4) * 2;
        e.v.y += (ty - e.p.y) * 2 * h;
        e.v.y *= Math.exp(-2 * h);
        V3.subVectors(S.p, e.p); V3.y = 0;
        var dz2 = V3.length() || 1;
        V3.multiplyScalar(1 / dz2);
        V3b.set(-V3.z, 0, V3.x).multiplyScalar(2.4);
        V3.multiplyScalar(dz2 > 30 ? 3 : dz2 < 20 ? -3 : 0).add(V3b);
        e.v.x += (V3.x - e.v.x) * (1 - Math.exp(-1.2 * h));
        e.v.z += (V3.z - e.v.z) * (1 - Math.exp(-1.2 * h));
        e.cd -= h;
        if (e.cd <= 0) { e.cd = 7; launchBombs(e); }
      }
    }
    e.p.addScaledVector(e.v, h);
    var erH = Math.hypot(e.p.x, e.p.z);
    if (erH > ARENA_R) { e.p.x *= ARENA_R / erH; e.p.z *= ARENA_R / erH; }
    var eFloor = e.type === "sentinel" ? GROUND_Y + 1.4 : GROUND_Y + 1.2;
    if (e.p.y < eFloor) { e.p.y = eFloor; if (e.v.y < 0) e.v.y *= -0.4; }
    if (e.p.y > CEIL_Y - 1) e.p.y = CEIL_Y - 1;
    pillarPushXZ(e.p, e.cfg.r * 0.7);
    // body contact
    var cr = e.type === "sentinel" ? 2.4 : 1.6;
    if (!e.dead && e.p.distanceTo(S.p) < cr && (e.type === "drone" || e.type === "sentinel")) {
      var cutting = S.melee && S.melee.phase === "swing" && e.type === "drone";
      if (S.inv <= 0 && S.dashI <= 0 && !S.strike && S.graceT <= 0 && !cutting) {
        hurt();
        if (e.type === "drone") { e.dead = true; burstShards(e.p, 10, 8, 0.15); }
      }
    }
  }
  // separation
  for (var a2 = 0; a2 < S.enemies.length; a2++)
    for (var b2 = a2 + 1; b2 < S.enemies.length; b2++) {
      var ea = S.enemies[a2], eb = S.enemies[b2];
      V3.subVectors(eb.p, ea.p);
      var dd = V3.length();
      var minD = ea.cfg.r + eb.cfg.r;
      if (dd > 0.001 && dd < minD) {
        V3.multiplyScalar(((minD - dd) / dd) * 0.5);
        ea.p.sub(V3); eb.p.add(V3);
      }
    }
  var survivors = [];
  for (var f2 = 0; f2 < S.enemies.length; f2++) if (!S.enemies[f2].dead) survivors.push(S.enemies[f2]);
  S.enemies = survivors;
  if (S.lockedE && S.lockedE.dead) S.lockedE = null;

  // ---- bolts ----
  for (var b3 = 0; b3 < S.bolts.length; b3++) {
    var bl2 = S.bolts[b3];
    if (bl2.dead) continue;
    bl2.life -= h;
    V3.subVectors(S.p, bl2.p).normalize().multiplyScalar(11);
    bl2.v.lerp(V3, 1 - Math.exp(-1.1 * h));
    bl2.p.addScaledVector(bl2.v, h);
    if (bl2.p.y < GROUND_Y + 0.5) bl2.p.y = GROUND_Y + 0.5;
    if (bl2.life <= 0) bl2.dead = true;
    else if (pillarPushXZ(bl2.p, 0.1)) { bl2.dead = true; burstShards(bl2.p, 4, 10, 0.9, null, 0.6); }
    else {
      var dpb = bl2.p.distanceTo(S.p);
      if (dpb < 1.2) {
        bl2.dead = true;
        burstShards(bl2.p, 5, 12, 0.9, null, 0.6);
        sfx.boltPop();
        vulnHit();
      }
    }
  }
  var bs2 = [];
  for (var b4 = 0; b4 < S.bolts.length; b4++) if (!S.bolts[b4].dead) bs2.push(S.bolts[b4]);
  S.bolts = bs2;

  // ---- sentinel slams ----
  for (var s3 = S.slams.length - 1; s3 >= 0; s3--) {
    var sl = S.slams[s3];
    sl.t += h;
    var slr = (sl.t / 0.8) * 16;
    var d2p = Math.hypot(S.p.x - sl.x, S.p.z - sl.z);
    var altP2 = S.p.y - GROUND_Y;
    if (Math.abs(d2p - slr) < 1.2 && altP2 < 2.8 && altP2 > -0.4) {
      if (S.inv <= 0) {
        if (S.dashI > 0 || S.strike || S.graceT > 0) { if (!sl.pd) { sl.pd = true; perfectDodge(); } }
        else hurt();
      }
    }
    if (sl.t >= 0.8) S.slams.splice(s3, 1);
  }

  // ---- zenith bombs ----
  for (var b5 = S.bombs.length - 1; b5 >= 0; b5--) {
    var bo = S.bombs[b5];
    bo.t += h;
    if (bo.t >= 0.9) {
      V3e.set(bo.x, GROUND_Y + 0.15, bo.z);
      ringAt(V3e, 0.45, REDC, 8, true);
      V3e.set(bo.x, GROUND_Y + 6, bo.z);
      burstShards(V3e, 10, 18, 0.85, null, 0.9);
      beamAt(bo.x, GROUND_Y + 22, bo.z, REDC);
      sfx.boomS();
      var dbx = Math.hypot(S.p.x - bo.x, S.p.z - bo.z);
      if (dbx < 3 && S.p.y > GROUND_Y - 0.4) vulnHit();
      else if (dbx < 4.5 && (S.dashI > 0 || S.strike)) perfectDodge();
      if (dbx < 12) S.shake = Math.max(S.shake, 0.15);
      S.bombs.splice(b5, 1);
    }
  }
}

// ================= frame loop =================
var last = performance.now(), acc = 0;
var Q = new THREE.Quaternion(), QT = new THREE.Quaternion(), EU = new THREE.Euler();
var overShown = false;
var TYPEKEYS = ["tesseron", "drone", "dart", "weaver", "sentinel", "zenith"];

function frame(now) {
  requestAnimationFrame(frame);
  var rdt = Math.min(0.05, (now - last) / 1000);
  last = now;
  if (S.mode === "menu" || S.paused) { S.mDX = 0; S.mDY = 0; renderer.render(scene, camera); return; }

  // ---- look input: the camera belongs to the player, nothing else rotates it ----
  S.yaw = wrapAngle(S.yaw - clampN(S.mDX * SENS, -0.5, 0.5));
  S.pitch = clampN(S.pitch - clampN(S.mDY * SENS, -0.5, 0.5), -1.25, 1.25);
  S.mDX = 0; S.mDY = 0;

  if (S.charge) {
    S.charge.t += rdt;
    if (!S.charge.touch && S.charge.t >= 0.45) { S.charge = null; trySkewer(null); }
  }
  S.pdT -= rdt; S.pdCd -= rdt; S.inv -= rdt;

  var tsGoal = S.mode === "dying" ? 0.22 : S.pdT > 0 ? 0.35 : S.charge ? 0.55 : (S.lanceT > 0 ? 0.3 : 1);
  S.ts += (tsGoal - S.ts) * damp(9, rdt);
  if (S.freeze > 0) { S.hitSlow = Math.min(1, 0.55 + S.freeze * 6); S.freeze = 0; }
  S.hitSlow *= Math.exp(-11 * rdt);
  var sdt = rdt * S.ts * (1 - 0.9 * S.hitSlow);

  if (S.mode === "dying") {
    S.dyingT -= rdt;
    if (S.dyingT <= 0 && !overShown) {
      overShown = true;
      S.mode = "over";
      var isBest = S.score >= best && S.score > 0;
      best = Math.max(best, S.score);
      $("finalScore").textContent = S.score;
      var secs = Math.floor(S.t % 60);
      $("finalStats").textContent = "survived " + Math.floor(S.t / 60) + ":" + (secs < 10 ? "0" : "") + secs + " \u00B7 " + S.kills + " broken \u00B7 peak \u00D7" + Math.min(9, S.maxCombo);
      if (isBest) show($("bestTag")); else hideEl($("bestTag"));
      show($("over"));
    }
  }

  if (S.mode === "play" && sdt > 0) {
    acc = Math.min(acc + sdt, H_STEP * 8);
    while (acc >= H_STEP) { step(H_STEP); acc -= H_STEP; }
  }
  var alpha = acc / H_STEP;

  if (S.mode === "play") updateLock(rdt, now);

  // ---- player render (interpolated) ----
  var pp = V3.lerpVectors(S.pPrev, S.p, alpha).clone();
  player.position.copy(pp);
  var speedDisp = S.strike ? 60 : S.dash ? 30 : S.vel.length();

  Q.setFromAxisAngle(UP, S.yaw);
  V3b.set(S.vel.x, 0, S.vel.z);
  var hSpd = V3b.length();
  if (hSpd > 0.5) {

  player.position.y += Math.sin(S.t * 1.7) * 0.05;
  var blink = S.inv > 0 && Math.floor(now / 70) % 2 === 0;

      if (ka >= 1 && !S.lockChirped) { S.lockChirped = true; blip(1500, 1950, 0.05, "sine", 0.045); }
      if (S.charge) {
        retRing.style.display = "block";
        var pct = Math.min(1, S.charge.t / (S.charge.touch ? 0.4 : 0.45)) * 360;
        var col = S.charge.t >= (S.charge.touch ? 0.4 : 0.3) ? "#FFD98A" : "#FF4438";
        retRing.style.background = "conic-gradient(" + col + " " + pct + "deg, rgba(232,238,242,.12) 0deg)";
        retRing.style.webkitMask = "radial-gradient(circle, transparent 58%, #000 60%)";
        retRing.style.mask = "radial-gradient(circle, transparent 58%, #000 60%)";
      } else retRing.style.display = "none";
    } else retEl.style.display = "none";
  } else { retEl.style.display = "none"; retRing.style.display = "none"; }
  crossEl.style.background = hasLock ? "#FF4438" : "#E8EEF2";
  crossEl.style.display = (S.lockActive || isTouch) ? "block" : "none";
  var dashK = clampN(1 - S.dashCd / DASH_CD, 0, 1);
  dashFill.style.width = (dashK * 100) + "%";
  dashFill.style.background = dashK >= 1 ? "#E8EEF2" : "rgba(232,238,242,.45)";

  // edge arrows for close off-screen threats
  var arrowUsed = 0;
  if (S.mode === "play") {
    var threats = [];
    for (var ie = 0; ie < S.enemies.length; ie++) {
      var te = S.enemies[ie];
      var dte = te.p.distanceTo(S.p);
      if (dte < 34) threats.push({ e: te, d: dte });
    }
    threats.sort(function (a, b) { return a.d - b.d; });
    for (var ia = 0; ia < threats.length && arrowUsed < 4; ia++) {
      V3.copy(threats[ia].e.p).applyMatrix4(camera.matrixWorldInverse);
      var onScreen = false;
      if (V3.z < 0) {
        V3b.copy(threats[ia].e.p).project(camera);
        onScreen = Math.abs(V3b.x) < 0.92 && Math.abs(V3b.y) < 0.9;
      }
      if (onScreen) continue;
      var dirX = V3.x, dirY = V3.y;
      if (V3.z > 0) { dirX = -dirX; dirY = -dirY; }
      var m3 = Math.hypot(dirX, dirY) || 1;
      dirX /= m3; dirY /= m3;
      var ar = arrows[arrowUsed++];
      var cxp = window.innerWidth / 2 + dirX * window.innerWidth * 0.4;
      var cyp = window.innerHeight / 2 - dirY * window.innerHeight * 0.4;
      var deg = Math.atan2(dirX, dirY) * 57.2958;
      ar.style.opacity = Math.max(0.25, 1 - threats[ia].d / 34);
      ar.style.left = (cxp - 7) + "px";
      ar.style.top = (cyp - 8) + "px";
      ar.style.transform = "rotate(" + deg + "deg)";
    }
  }
  for (var ja = arrowUsed; ja < 4; ja++) arrows[ja].style.opacity = 0;

  // ---- HUD ----
  scoreEl.textContent = S.score;
  var mult = Math.min(9, S.combo);
  comboEl.textContent = mult > 1 ? "\u00D7" + mult : "";
  comboEl.style.color = mult >= 5 ? GOLD : CHALK;
  lanceEl.style.width = S.lanceT > 0 ? ((S.lanceT / 0.8) * 64) + "px" : "0";
  bestEl.textContent = "BEST " + best;
  heatFill.style.width = S.heat + "%";
  heatFill.style.background = S.heat >= COST_SKEWER ? "#FFD98A" : "#FF6B3D";
  flareBtn.style.opacity = S.heat >= COST_FLARE ? 1 : 0.35;
  dashBtn.style.opacity = dashK >= 1 ? 1 : 0.35;
  if (S.t > 10) hintEl.style.opacity = Math.max(0, 0.6 * (13 - S.t) / 3);
  flashRed.style.opacity = Math.max(0, parseFloat(flashRed.style.opacity || 0) - rdt * 2.2);
  flashHit.style.opacity = Math.max(0, parseFloat(flashHit.style.opacity || 0) - rdt * 1.6);
  tintSlow.style.opacity = Math.max(0, (1 - S.ts) * 1.1 - 0.1);

  for (var i7 = pops.length - 1; i7 >= 0; i7--) {
    var pop = pops[i7];
    pop.life -= rdt; pop.wp.y += rdt * 1.6;
    V3.copy(pop.wp).project(camera);
    if (pop.life <= 0 || V3.z > 1) { hudEl.removeChild(pop.d); pops.splice(i7, 1); continue; }
    pop.d.style.left = ((V3.x * 0.5 + 0.5) * window.innerWidth) + "px";
    pop.d.style.top = ((-V3.y * 0.5 + 0.5) * window.innerHeight) + "px";
    pop.d.style.opacity = Math.min(1, pop.life * 2);
  }

  sfx.wind(Math.min(1, (S.strike ? 0.9 : S.dash ? 0.8 : speedDisp / 24) + (S.lanceT > 0 ? 0.15 : 0)));
  renderer.render(scene, camera);
}
requestAnimationFrame(frame);

// ================= flow =================
function startGame() {
  audioEnsure(); sfx.begin();
  overShown = false;
  resetGame();
  summonTesseron();
  hideEl($("menu")); hideEl($("over")); hideEl($("resume"));
  requestLock();
}
$("startBtn").addEventListener("click", startGame);
$("againBtn").addEventListener("click", startGame);
$("resumeBtn").addEventListener("click", function () { requestLock(); });
$("menuControls").innerHTML = isTouch
  ? "tap: lance / blade string \u00B7 hold: cleave (30) \u00B7 longer: skewer (55)<br>DASH + FLARE (20) buttons \u00B7 drag to look"
  : "WASD: move \u00B7 SPACE: fly \u00B7 C: dive under the floor \u00B7 SHIFT: dash \u00B7 LMB: blade \u00B7 F: lance<br>RMB tap: cleave (30) \u00B7 RMB hold: skewer (55) \u00B7 E: flare (20) \u00B7 esc pauses";

window.addEventListener("resize", function () {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
});
})();
</script>
</body>
